# Pipeline de CI executado em todo push e pull request para a branch main.
#
# Etapas:
#   1. lint    — verifica estilo e imports com Ruff
#   2. typecheck — valida tipagem estática com MyPy
#   3. test    — executa a suíte de testes com Pytest (Redis real via service container)
#
# O Redis é iniciado como service container do GitHub Actions para que os
# testes de integração futuros possam usar um Redis real se necessário.
# Os testes unitários atuais usam mocks e não dependem do Redis real.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Instalar dependências de desenvolvimento
        run: uv sync --frozen

      - name: Verificar estilo e imports (Ruff)
        run: uv run ruff check app/ tests/

      - name: Verificar formatação (Ruff format)
        run: uv run ruff format --check app/ tests/

  typecheck:
    name: Tipagem (MyPy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Instalar dependências de desenvolvimento
        run: uv sync --frozen

      - name: Verificar tipos estáticos (MyPy)
        run: uv run mypy app/ tests/

  test:
    name: Testes (Pytest)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Instalar dependências de desenvolvimento
        run: uv sync --frozen

      - name: Executar testes
        run: uv run pytest -v
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
