# Pipeline de CI executado em todo push e pull request para a branch main.
#
# Etapas:
#   1. lint      — verifica estilo e imports com Ruff
#   2. typecheck — valida tipagem estática com MyPy
#   3. test      — executa a suíte de testes com Pytest (Redis real via service container)
#
# O Redis é iniciado como service container para que testes de integração
# futuros possam usá-lo sem necessidade de infraestrutura adicional.
# Os testes unitários atuais usam mocks e não dependem do Redis real.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Princípio do menor privilégio: CI puro não precisa escrever no repositório.
permissions:
  contents: read

# Cancela execuções antigas da mesma branch ao receber novos pushes,
# evitando desperdício de minutos de runner em commits já superados.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Instalar uv
        uses: astral-sh/setup-uv@v7

      - name: Instalar dependências de desenvolvimento
        run: uv sync --frozen

      - name: Verificar estilo e imports (Ruff)
        run: uv run ruff check app/ tests/

      - name: Verificar formatação (Ruff format)
        run: uv run ruff format --check app/ tests/

  typecheck:
    name: Tipagem (MyPy)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Instalar uv
        uses: astral-sh/setup-uv@v7

      - name: Instalar dependências de desenvolvimento
        run: uv sync --frozen

      - name: Verificar tipos estáticos (MyPy)
        run: uv run mypy app/ tests/

  test:
    name: Testes (Pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, typecheck]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Instalar uv
        uses: astral-sh/setup-uv@v7

      - name: Instalar dependências de desenvolvimento
        run: uv sync --frozen

      - name: Executar testes
        run: uv run pytest -v
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379

